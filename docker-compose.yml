services:
  api:
    build: .
    container_name: hungryhub-api-rails
    ports:
      - "3000:3000"
    environment:
      RAILS_ENV: development
      API_KEY: ${API_KEY:-}
    volumes:
      - .:/rails
    command: bash -lc "bundle install && bin/rails db:prepare && bin/rails s -b 0.0.0.0 -p 3000"
